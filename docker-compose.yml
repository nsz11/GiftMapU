# docker-compose.yml — Vibe full-stack orchestration
#
# Services:
#   backend  — Express API on port 3002
#   frontend — React SPA on port 3000
# Note: MongoDB is hosted on Atlas (no local mongo container needed)

services:
  backend:
    build:
      context: ./server
      dockerfile: ../server.Dockerfile
    container_name: vibe-backend
    restart: unless-stopped
    ports:
      - "3002:3002"
    environment:
      - NODE_ENV=production

  frontend:
    build:
      context: ./client
      dockerfile: ../client.Dockerfile
    container_name: vibe-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      - backend

